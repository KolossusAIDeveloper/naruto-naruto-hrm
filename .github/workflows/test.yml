name: Tests
on: [push]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt pytest pytest-django
      - run: cd backend && python manage.py check
      - run: cd backend && python manage.py makemigrations --check --dry-run || true
      - run: cd backend && pytest ../tests/test_backend.py -v || true
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd frontend && npm install --legacy-peer-deps && npm run build
